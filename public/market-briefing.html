<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>市場晨報已遷移 → Stockcast.tw</title>
<meta name="robots" content="noindex,follow">
<meta http-equiv="refresh" content="5;url=https://stockcast.tw/">
<link rel="canonical" href="https://stockcast.tw/">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Noto Sans TC',system-ui,sans-serif;background:#f6f5f1;color:#121212;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.card{background:#fff;border-radius:16px;padding:48px 40px;max-width:520px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.08);border:1px solid #eae8e2;text-align:center}
.badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#eb8054;font-family:monospace;background:#fef3ec;padding:4px 12px;border-radius:999px;margin-bottom:20px}
h1{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:12px;line-height:1.3}
p{font-size:14px;color:#6c6a62;line-height:1.7;margin-bottom:28px}
.btn{display:inline-block;background:#121212;color:#fff;text-decoration:none;padding:14px 28px;border-radius:999px;font-size:14px;font-weight:700;letter-spacing:0.3px;transition:opacity .2s}
.btn:hover{opacity:0.85}
.countdown{font-size:12px;color:#b0aca4;margin-top:20px;font-family:monospace}
</style>
</head>
<body>
<div class="card">
  <div class="badge">頁面已遷移</div>
  <h1>市場晨報已搬到新網站</h1>
  <p>
    本頁面（slideless.vercel.app/market-briefing）已<strong>停止更新</strong>。<br>
    最新的市場晨報、Podcast 摘要與數據分析，<br>
    請前往我們的新網站繼續瀏覽。
  </p>
  <a href="https://stockcast.tw/" class="btn">前往 Stockcast.tw →</a>
  <div class="countdown" id="cd">5 秒後自動跳轉…</div>
</div>
<script>
var n=5;var t=setInterval(function(){n--;document.getElementById('cd').textContent=n>0?n+' 秒後自動跳轉…':'正在跳轉…';if(n<=0){clearInterval(t);location.href='https://stockcast.tw/';}},1000);
</script>
</body>
</html>
