<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Slideless — Rain AI Team Reports</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f6f5f1;color:#2d2d2d;line-height:1.6}
.header{padding:3rem 2rem 2rem;text-align:center;border-bottom:1px solid #e0ddd6}
.header h1{font-size:1.8rem;font-weight:700;letter-spacing:-0.02em}
.header p{color:#6b6860;margin-top:0.5rem;font-size:0.95rem}
.container{max-width:800px;margin:0 auto;padding:2rem}
.report-list{list-style:none}
.report-list li{padding:0.75rem 0;border-bottom:1px solid #ebe8e1}
.report-list li:last-child{border-bottom:none}
.report-list a{color:#2d2d2d;text-decoration:none;font-weight:500;transition:color 0.15s}
.report-list a:hover{color:#b87333}
.report-list .date{color:#9a9590;font-size:0.85rem;margin-left:0.5rem}
.footer{text-align:center;padding:2rem;color:#9a9590;font-size:0.85rem}
</style>
</head>
<body>
<div class="header">
<h1>Slideless</h1>
<p>Rain AI Team — Deck Reports</p>
</div>
<div class="container">
<ul class="report-list" id="reports"></ul>
</div>
<div class="footer">Powered by Rain AI Team</div>
<script>
// Auto-generate report list from known files
const reports = [
  "market-briefing",
  "team-ops-report-2026-03-12",
  "team-ops-report-2026-03-11",
  "org-reform-2026-03-13",
  "team-architecture-review-2026-03-13",
  "governance-final-report-2026-03-13",
  "ai-governance-system-2026-03-13",
  "konggoo-redesign-2026-03-13",
  "openclaw-upgrade-2026-03-13",
  "team-workflow-audit-2026-03-11",
  "team-improvement-plan-2026-03-10",
  "system-audit-2026-03-10",
  "session-changes-2026-03-10",
  "website-audit-2026-03-07",
  "ai-team-profile",
  "revenue-dashboard-report",
  "auto-money-final-report",
  "business-plan",
  "1m-business-model",
  "bank-law-report-2026",
  "bank-audit-notes",
  "accounting-reference",
  "lax-trip-2026",
  "sample-report",
];
const ul = document.getElementById("reports");
reports.forEach(r => {
  const li = document.createElement("li");
  const a = document.createElement("a");
  a.href = r + ".html";
  a.textContent = r.replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());
  const dateMatch = r.match(/(\d{4}-\d{2}-\d{2})/);
  if (dateMatch) {
    const span = document.createElement("span");
    span.className = "date";
    span.textContent = dateMatch[1];
    li.appendChild(a);
    li.appendChild(span);
  } else {
    li.appendChild(a);
  }
  ul.appendChild(li);
});
</script>
</body>
</html>
